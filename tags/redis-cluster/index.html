<script>
(function() {
  
  
  const cdnProviders = {
    
    'aliyun': {
      mermaid: 'https://g.alicdn.com/code/lib/mermaid/10.6.1/mermaid.min.js',
      katexCSS: 'https://g.alicdn.com/code/lib/KaTeX/0.16.9/katex.min.css',
      katexJS: 'https://g.alicdn.com/code/lib/KaTeX/0.16.9/katex.min.js',
      katexAutoRender: 'https://g.alicdn.com/code/lib/KaTeX/0.16.9/contrib/auto-render.min.js',
      notoSansSC: 'https://g.alicdn.com/code/lib/google-fonts/noto-sans-sc/v27/noto-sans-sc.css'
    },
    
    'tencent': {
      mermaid: 'https://libs.baidu.com/libs/mermaid/10.6.1/mermaid.min.js',
      katexCSS: 'https://libs.baidu.com/libs/KaTeX/0.16.9/katex.min.css',
      katexJS: 'https://libs.baidu.com/libs/KaTeX/0.16.9/katex.min.js',
      katexAutoRender: 'https://libs.baidu.com/libs/KaTeX/0.16.9/contrib/auto-render.min.js',
      notoSansSC: 'https://libs.baidu.com/libs/google-fonts/noto-sans-sc/v27/noto-sans-sc.css'
    },
    
    'qiniu': {
      mermaid: 'https://cdn.staticfile.org/mermaid/10.6.1/mermaid.min.js',
      katexCSS: 'https://cdn.staticfile.org/KaTeX/0.16.9/katex.min.css',
      katexJS: 'https://cdn.staticfile.org/KaTeX/0.16.9/katex.min.js',
      katexAutoRender: 'https://cdn.staticfile.org/KaTeX/0.16.9/contrib/auto-render.min.js',
      notoSansSC: 'https://cdn.staticfile.org/google-fonts/noto-sans-sc/v27/noto-sans-sc.css'
    },
    
    'bootcdn': {
      mermaid: 'https://cdn.bootcdn.net/ajax/libs/mermaid/10.6.1/mermaid.min.js',
      katexCSS: 'https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.css',
      katexJS: 'https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/katex.min.js',
      katexAutoRender: 'https://cdn.bootcdn.net/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js',
      notoSansSC: 'https://cdn.bootcdn.net/ajax/libs/google-fonts/noto-sans-sc/v27/noto-sans-sc.css'
    },
    
    'unpkg-cn': {
      mermaid: 'https://unpkg.com/mermaid@10.6.1/dist/mermaid.min.js',
      katexCSS: 'https://unpkg.com/katex@0.16.9/dist/katex.min.css',
      katexJS: 'https://unpkg.com/katex@0.16.9/dist/katex.min.js',
      katexAutoRender: 'https://unpkg.com/katex@0.16.9/dist/contrib/auto-render.min.js',
      notoSansSC: 'https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap'
    },
    
    'jsdelivr': {
      mermaid: 'https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js',
      katexCSS: 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css',
      katexJS: 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js',
      katexAutoRender: 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js',
      notoSansSC: 'https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;700&display=swap'
    },
    
    'cloudflare': {
      mermaid: 'https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.6.1/mermaid.min.js',
      katexCSS: 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css',
      katexJS: 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js',
      katexAutoRender: 'https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js',
      notoSansSC: 'https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap'
    }
  };

  
  const localPaths = {
    mermaid: '/js/vendor/mermaid.min.js',
    katexCSS: '/css/vendor/katex.min.css',
    katexJS: '/js/vendor/katex.min.js',
    katexAutoRender: '/js/vendor/katex-auto-render.min.js',
    notoSansSC: '/css/vendor/fonts/noto-sans-sc.css'
  };

  
  const cdnOrder = ['aliyun', 'tencent', 'qiniu', 'bootcdn', 'unpkg-cn', 'jsdelivr', 'cloudflare'];

  
  function loadCSS(resourceKey) {
    return new Promise((resolve, reject) => {
      let currentCDNIndex = 0;
      let loaded = false;
      
      function tryNextCDN() {
        if (currentCDNIndex >= cdnOrder.length) {
          
          loadLocal();
          return;
        }

        const provider = cdnOrder[currentCDNIndex];
        const url = cdnProviders[provider][resourceKey];
        
        console.log(`🔄 Trying ${provider} CDN for ${resourceKey}...`);
        
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        
        const timeoutId = setTimeout(() => {
          if (!loaded) {
            console.warn(`⏱️ ${provider} CDN timeout for ${resourceKey}, trying next...`);
            cleanup();
            currentCDNIndex++;
            tryNextCDN();
          }
        }, 2000); 
        
        link.onload = () => {
          if (!loaded) {
            loaded = true;
            clearTimeout(timeoutId);
            console.log(`✅ CSS loaded from ${provider} CDN: ${url}`);
            resolve();
          }
        };
        
        link.onerror = () => {
          if (!loaded) {
            console.warn(`❌ ${provider} CDN failed for ${resourceKey}`);
            cleanup();
            currentCDNIndex++;
            tryNextCDN();
          }
        };
        
        function cleanup() {
          clearTimeout(timeoutId);
          if (link.parentNode) {
            link.parentNode.removeChild(link);
          }
        }
        
        document.head.appendChild(link);
      }
      
      function loadLocal() {
        const localUrl = localPaths[resourceKey];
        console.log(`🔄 Falling back to local file: ${localUrl}`);
        
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = localUrl;
        
        link.onload = () => {
          if (!loaded) {
            loaded = true;
            console.log(`✅ CSS loaded from local: ${localUrl}`);
            resolve();
          }
        };
        
        link.onerror = () => {
          if (!loaded) {
            loaded = true;
            console.error(`❌ Failed to load CSS from all CDNs and local`);
            reject(new Error(`CSS load failed for ${resourceKey}`));
          }
        };
        
        document.head.appendChild(link);
      }
      
      
      tryNextCDN();
    });
  }

  
  function loadJS(resourceKey) {
    return new Promise((resolve, reject) => {
      let currentCDNIndex = 0;
      let loaded = false;
      
      function tryNextCDN() {
        if (currentCDNIndex >= cdnOrder.length) {
          
          loadLocal();
          return;
        }

        const provider = cdnOrder[currentCDNIndex];
        const url = cdnProviders[provider][resourceKey];
        
        console.log(`🔄 Trying ${provider} CDN for ${resourceKey}...`);
        
        const script = document.createElement('script');
        script.src = url;
        script.async = true;
        
        const timeoutId = setTimeout(() => {
          if (!loaded) {
            console.warn(`⏱️ ${provider} CDN timeout for ${resourceKey}, trying next...`);
            cleanup();
            currentCDNIndex++;
            tryNextCDN();
          }
        }, 2000); 
        
        script.onload = () => {
          if (!loaded) {
            loaded = true;
            clearTimeout(timeoutId);
            console.log(`✅ JS loaded from ${provider} CDN: ${url}`);
            resolve();
          }
        };
        
        script.onerror = () => {
          if (!loaded) {
            console.warn(`❌ ${provider} CDN failed for ${resourceKey}`);
            cleanup();
            currentCDNIndex++;
            tryNextCDN();
          }
        };
        
        function cleanup() {
          clearTimeout(timeoutId);
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
        
        document.head.appendChild(script);
      }
      
      function loadLocal() {
        const localUrl = localPaths[resourceKey];
        console.log(`🔄 Falling back to local file: ${localUrl}`);
        
        const script = document.createElement('script');
        script.src = localUrl;
        
        script.onload = () => {
          if (!loaded) {
            loaded = true;
            console.log(`✅ JS loaded from local: ${localUrl}`);
            resolve();
          }
        };
        
        script.onerror = () => {
          if (!loaded) {
            loaded = true;
            console.error(`❌ Failed to load JS from all CDNs and local`);
            reject(new Error(`JS load failed for ${resourceKey}`));
          }
        };
        
        document.head.appendChild(script);
      }
      
      
      tryNextCDN();
    });
  }

  
  window.ResourceLoader = {
    loadCSS,
    loadJS,
    cdnProviders,
    localPaths,
    cdnOrder
  };
})();
</script>

<script>
(function() {
  if (typeof window.ResourceLoader === 'undefined') {
    console.error('ResourceLoader not initialized');
    return;
  }
  
  
  window.ResourceLoader.loadJS('mermaid').then(() => {
    
    document.addEventListener('DOMContentLoaded', async function() {
      if (typeof mermaid === 'undefined') {
        console.error('❌ Mermaid: mermaid object not found!');
        return;
      }

      console.log('✅ Mermaid loaded, version:', mermaid.version || 'unknown');

      
      mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose',
        fontFamily: '"Noto Sans SC", "Noto Sans JP", "Noto Sans KR", sans-serif',
        flowchart: {
          useMaxWidth: true,
          htmlLabels: true,
          curve: 'basis'
        },
        sequence: {
          useMaxWidth: true,
          wrap: true
        },
        gantt: {
          useMaxWidth: true
        }
      });

      
      const mermaidElements = document.querySelectorAll('.mermaid');
      
      if (mermaidElements.length === 0) {
        return;
      }

      
      for (let i = 0; i < mermaidElements.length; i++) {
        const element = mermaidElements[i];
        
        
        if (element.querySelector('svg')) {
          continue;
        }

        
        
        const graphDefinition = element.textContent.trim();
        
        if (!graphDefinition) {
          continue;
        }

        try {
          
          const id = `mermaid-${Date.now()}-${i}`;
          const { svg } = await mermaid.render(id, graphDefinition);
          
          
          element.innerHTML = svg;
          element.classList.add('mermaid-rendered');
          
        } catch (error) {
          console.error(`Mermaid rendering error [${i}]:`, error);
          
          
          element.innerHTML = `
            <div style="color: #dc3545; padding: 1rem; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 4px;">
              <strong>Mermaid Diagram Error</strong><br>
              <small>${error.message}</small>
            </div>
          `;
          element.classList.add('mermaid-error');
        }
      }
      
      if (mermaidElements.length > 0) {
        console.log(`Mermaid: ${mermaidElements.length} diagram(s) processed`);
      }
    });
  }).catch(err => {
    console.error('Failed to load Mermaid:', err);
  });
})();
</script>


<script>
(function() {
  if (typeof window.ResourceLoader === 'undefined') {
    console.error('ResourceLoader not initialized');
    return;
  }
  
  
  Promise.all([
    window.ResourceLoader.loadJS('katexJS'),
    window.ResourceLoader.loadJS('katexAutoRender')
  ]).then(() => {
    
    document.addEventListener("DOMContentLoaded", function() {
      console.log('KaTeX: Initializing...');
      
      
      setTimeout(function() {
        if (typeof katex === 'undefined') {
          console.error('❌ KaTeX: katex object not found!');
          return;
        }
        
        console.log('✅ KaTeX loaded, version:', katex.version);
        
        if (typeof renderMathInElement === 'undefined') {
          console.error('❌ KaTeX: renderMathInElement not found!');
          return;
        }
        
        console.log('✅ KaTeX auto-render available');
        
        try {
          renderMathInElement(document.body, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false,
            trust: true,
            strict: false,
            macros: {
              "\\target": "\\text{target}",
              "\\mkt": "\\text{mkt}",
              "\\BL": "\\text{BL}"
            },
            
            errorCallback: function(msg, tex) {
              console.warn('⚠️ KaTeX warning:', msg);
              console.warn('   Formula:', tex.substring(0, 150));
            }
          });
          
          const renderedFormulas = document.querySelectorAll('.katex');
          console.log(`📊 KaTeX: Successfully rendered ${renderedFormulas.length} formulas`);
          
          
          const allParagraphs = Array.from(document.querySelectorAll('p'));
          let unrenderedDetails = [];
          
          allParagraphs.forEach((p, index) => {
            const text = p.textContent;
            if (text.includes('$$')) {
              
              const hasKatex = p.querySelector('.katex');
              if (!hasKatex) {
                unrenderedDetails.push({
                  index: index,
                  content: text.substring(0, 100)
                });
              }
            }
          });
          
          if (unrenderedDetails.length > 0) {
            console.warn(`⚠️ KaTeX: Found ${unrenderedDetails.length} paragraphs with unrendered formulas:`);
            unrenderedDetails.forEach((item, i) => {
              if (i < 5) { 
                console.warn(`   [${i + 1}] ${item.content}...`);
              }
            });
            if (unrenderedDetails.length > 5) {
              console.warn(`   ... and ${unrenderedDetails.length - 5} more`);
            }
          }
          
        } catch (error) {
          console.error('❌ KaTeX rendering error:', error);
          console.error('Stack:', error.stack);
        }
      }, 100);
    });
  }).catch(err => {
    console.error('Failed to load KaTeX:', err);
  });
})();
</script>
