baseURL = "/"
languageCode = "zh-cn"
theme = "hugo-winston-theme"
themesDir = "themes"
title = "技术博客"
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true
pygmentsUseClasses = true

[pagination]
  pagerSize = 10

[module]
  [module.hugoVersion]
    extended = true
    min = "0.55.0"

[params]
  google_analytics_id = ""
  twitter_handle = "@techblog"
  showAuthorOnHomepage = true
  showAuthorOnPosts = false
  showIntroContentOnHomepage = true
  showPostsOnHomepage = true
  usePaginationOnHomepage = false
  limitPostsOnHomepage = 3 # only used if usePaginationOnHomepage is false
  sortPostsByDateOldestFirst = false
  addDot = true
  addFrame = true
  highlightColor = '#7b16ff'
  baseColor = "#ffffff"
  baseOffsetColor = "#eaeaea"
  headingColor = "#1c1b1d"
  textColor = "#4e5157"
  dotColor = "#7b16ff"
  # Enable local fonts loading
  enableGoogleFonts = true
  googleFontsUrl = "/css/vendor/fonts/noto-sans-sc.css"
  fontFamilyHeading = "Noto Sans SC"
  fontFamilyParagraph = "Noto Sans SC"
  fontFamilyMonospace = "monospace"

# markdown config settings https://gohugo.io/getting-started/configuration-markup/#goldmark
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      hardWraps = false
      unsafe = true
      xhtml = false
    [markup.goldmark.extensions]
      table = true
      strikethrough = true
      taskList = true
      definitionList = true
      footnote = true
      linkify = true
      linkifyProtocol = "https"
      autolink = true
      gfm = true

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 1
  [[menu.main]]
    name = "Blog"
    identifier = "blog"
    weight = 2
    url = "/posts/"
  [[menu.main]]
    name = "Tags"
    identifier = "tags"
    weight = 3
    url = "/tags/"
  [[menu.main]]
    name = "About"
    identifier = "about"
    weight = 4
    url = "/about/"